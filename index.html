<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>同じ月の下で — under the same moon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050d1a;
      touch-action: manipulation;
    }
    #c {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
    }
    /* Canvas 外で DOM 表示する場合の予備（現状は Canvas のみだが念のため強めに） */
    .word, .phrase, [class*="word"] {
      word-spacing: 1.05em !important;
    }
    /** スマホのみテキスト拡大の予備（Canvas 本体は JS で textScale 適用） */
    @media (max-width: 768px) {
      .word, .phrase, [class*="word"], [class*="phrase"] {
        font-size: 1.3em !important;
      }
      .tap-to-close, [class*="tap"], [class*="close-hint"] {
        font-size: 1.3em !important;
        opacity: 0.5 !important;
      }
    }
  </style>
  <!-- 音声: Web Audio API（audio/hum.mp3）— iOS 解除用 silent buffer + GainNode フェード -->
</head>
<body>
  <canvas id="c" aria-label="Moonlight on water"></canvas>
  <script>
(function () {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let blackoutStart = null;

  /** Web Audio API — iOS での再生と GainNode フェード */
  let audioContext = null;
  let humEncodedBuffer = null;
  let humBuffer = null;
  let humSource = null;
  let humGain = null;
  let humPlaybackStarted = false;
  let humUnlockRan = false;
  /** タップ close 時のゲインフェードを二重指定しない */
  let humTapFadeScheduled = false;
  /** デコード前に tap to close された場合、再生開始後にフェードをかける */
  let humCloseFadeRequested = false;

  async function preloadHumAudio() {
    try {
      const response = await fetch('audio/hum.mp3');
      if (!response.ok) throw new Error(response.statusText);
      const arrayBuffer = await response.arrayBuffer();
      humEncodedBuffer = arrayBuffer;
    } catch (err) {}
  }

  function playHumDecoded() {
    if (!audioContext || !humBuffer || humPlaybackStarted) return;
    humPlaybackStarted = true;
    humSource = audioContext.createBufferSource();
    humSource.buffer = humBuffer;
    humSource.loop = false;
    humGain = audioContext.createGain();
    humGain.gain.value = 1.0;
    humSource.connect(humGain);
    humGain.connect(audioContext.destination);
    try {
      if (audioContext.state === 'suspended') audioContext.resume();
    } catch (e) {}
    humSource.start(0);
    humSource.onended = function () {
      humSource = null;
    };
    if (humCloseFadeRequested) {
      humCloseFadeRequested = false;
      fadeOutHumOnClose();
    }
  }

  function decodeHumAndPlay(encoded) {
    if (!encoded || !audioContext) return;
    var slice = encoded.slice(0);
    audioContext.decodeAudioData(
      slice,
      function (buffer) {
        humBuffer = buffer;
        playHumDecoded();
      },
      function () {}
    );
  }

  /** 初回ジェスチャ: 体験タイムライン開始 + Web Audio アンロック（同一スタック内で play） */
  let experienceStarted = false;
  let appStart = null;

  function onFirstUserGesture(e) {
    if (!experienceStarted) {
      experienceStarted = true;
      appStart = performance.now();
      if (e && e.cancelable && e.type === 'touchstart') {
        try {
          e.preventDefault();
        } catch (err) {}
      }
    }
    if (humUnlockRan) return;
    humUnlockRan = true;

    var Ctor = window.AudioContext || window.webkitAudioContext;
    if (!Ctor) {
      return;
    }
    try {
      audioContext = new Ctor();
    } catch (e) {
      return;
    }

    try {
      if (audioContext.state === 'suspended') audioContext.resume();
    } catch (e) {}

    var silentBuffer = audioContext.createBuffer(1, 1, 22050);
    var silentSource = audioContext.createBufferSource();
    silentSource.buffer = silentBuffer;
    silentSource.connect(audioContext.destination);
    silentSource.start(0);

    if (humEncodedBuffer) {
      decodeHumAndPlay(humEncodedBuffer);
    } else {
      fetch('audio/hum.mp3')
        .then(function (r) {
          if (!r.ok) throw new Error(r.statusText);
          return r.arrayBuffer();
        })
        .then(function (ab) {
          humEncodedBuffer = ab;
          decodeHumAndPlay(ab);
        })
        .catch(function () {});
    }
  }

  /** 95〜100秒: ナレーション終盤のスムーズな減衰（tap close 中は無効） */
  function updateHumGain(nowT) {
    if (!humGain || !audioContext || blackoutStart !== null) return;
    if (humTapFadeScheduled) return;
    if (nowT < 95) return;
    var ctxTime = audioContext.currentTime;
    if (nowT >= 95 && nowT < 100) {
      var fadeProgress = (nowT - 95) / 5;
      var targetGain = Math.max(0, 1.0 - fadeProgress);
      humGain.gain.setTargetAtTime(targetGain, ctxTime, 0.1);
    } else if (nowT >= 100) {
      humGain.gain.setTargetAtTime(0, ctxTime, 0.1);
    }
  }

  /** tap to close: 3秒でゲイン 0 */
  function fadeOutHumOnClose() {
    if (!audioContext || humTapFadeScheduled) return;
    if (!humGain) {
      humCloseFadeRequested = true;
      return;
    }
    humTapFadeScheduled = true;
    var t = audioContext.currentTime;
    var g = humGain.gain;
    try {
      var cur = typeof g.value === 'number' ? g.value : 1;
      g.cancelScheduledValues(t);
      g.setValueAtTime(cur, t);
      g.linearRampToValueAtTime(0, t + 3);
    } catch (e) {}
  }

  window.addEventListener('DOMContentLoaded', preloadHumAudio);
  if (document.readyState !== 'loading') {
    preloadHumAudio();
  }

  document.addEventListener('touchstart', onFirstUserGesture, { once: true, passive: false });
  document.addEventListener('click', onFirstUserGesture, { once: true });

  const positions = ['water', 'moon', 'path'];
  const todayPosition = positions[Math.floor(Math.random() * 3)];

  const MOON_X_SLOTS = [0.22, 0.5, 0.78];
  const moonSlotIndex = Math.floor(Math.random() * 3);

  /** フェードイン5秒・フェードアウト3秒 */
  const PHRASES = [
    { t0: 0,  t1: 25, text: "it's okay",               fadeIn: 5, hold: 17, fadeOut: 3 },
    { t0: 25, t1: 50, text: "as you are",            fadeIn: 5, hold: 17, fadeOut: 3 },
    { t0: 50, t1: 75, text: "let it",                fadeIn: 5, hold: 17, fadeOut: 3 },
    {
      t0: 75,
      t1: 94,
      text: "Let me stay by your side",
      /** 単語を 0.52 秒ごとに開始し、階段状レイアウト（最終行は by your side） */
      staggerWords: ["Let", "me", "stay", "by", "your", "side"],
      staggerStaircase: true,
      /** この一文のみ通常より 1.2 倍のフォント */
      phraseSizeScale: 1.2,
      fadeIn: 5,
      hold: 11,
      fadeOut: 3
    }
  ];

  /** 最終フレーズの終了秒（これ以降 tap to close）— PHRASES と同期 */
  const NARRATIVE_END_SEC = PHRASES[PHRASES.length - 1].t1;

  /** Canvas 用: 単語間（旧 1.5em の 0.7 倍） */
  const WORD_SPACING_EM = 1.05;

  /** 最終フレーズ: 単語開始の間隔（秒）・各単語のフェードイン長（秒） */
  const STAGGER_WORD_GAP = 0.52;
  const STAGGER_WORD_FADE = 0.42;

  const WAVE_TIME = 0.6;
  const MOON_ENTER_SEC = 9;

  let horizonFrac = 0.6 + Math.random() * 0.05;

  let w = 0, h = 0, dpr = 1;
  /** 768px 以下でフレーズのフォントを 1.3 倍（PC は 1）。tap to close は drawTapHint 内で別途 1.8 倍 */
  let textScale = 1;
  let fontsReady = false;

  let moonlightParticles = [];

  /** 一番星（月の反対側・画面上部） — resize で決定 */
  let firstStar = { x: 0, y: 0, r: 0 };

  function hexToRgb(hex) {
    const h = hex.replace('#', '');
    return {
      r: parseInt(h.slice(0, 2), 16),
      g: parseInt(h.slice(2, 4), 16),
      b: parseInt(h.slice(4, 6), 16)
    };
  }

  function lerpColor(hexA, hexB, t) {
    const a = hexToRgb(hexA);
    const b = hexToRgb(hexB);
    const r = Math.round(a.r + (b.r - a.r) * t);
    const g = Math.round(a.g + (b.g - a.g) * t);
    const bl = Math.round(a.b + (b.b - a.b) * t);
    return '#' + [r, g, bl].map(function (v) {
      return v.toString(16).padStart(2, '0');
    }).join('');
  }

  /** 75〜95秒で 0→1、95秒以降は 1 */
  function dawnProgress(nowT) {
    if (nowT < 75) return 0;
    return Math.max(0, Math.min(1, (nowT - 75) / 20));
  }

  function rebuildMoonlightParticles() {
    const count = 60 + Math.floor(Math.random() * 41);
    moonlightParticles = [];
    for (let i = 0; i < count; i++) {
      const relY = 0.03 + Math.random() * 0.97;
      const depth = relY;
      const spread = Math.min(w, h) * (0.018 + depth * 0.07);
      const lane = (Math.random() - 0.5) * 2;
      moonlightParticles.push({
        relY: relY,
        lane: lane,
        spread: spread,
        phase: Math.random() * Math.PI * 2,
        size: 1 + Math.random() * 3,
        alpha: 0.1 + Math.random() * 0.5,
        aspect: 0.52 + Math.random() * 0.28
      });
    }
  }

  function moonRadiusRef() {
    return Math.min(w, h) * 0.055 * 1.1;
  }

  function rebuildFirstStar() {
    const mr = moonRadiusRef();
    /** 月を 1.1 倍にした分を除き、一番星の見かけサイズは従来どおり */
    const rr = (mr / 1.1) * (0.1 + Math.random() * 0.02);
    let sx;
    if (moonSlotIndex === 0) {
      sx = w * (0.68 + Math.random() * 0.22);
    } else if (moonSlotIndex === 2) {
      sx = w * (0.08 + Math.random() * 0.22);
    } else {
      sx = Math.random() < 0.5 ? w * (0.08 + Math.random() * 0.12) : w * (0.78 + Math.random() * 0.12);
    }
    const sy = h * (0.15 + Math.random() * 0.15);
    firstStar = { x: sx, y: sy, r: rr };
  }

  function rebuildScene() {
    rebuildMoonlightParticles();
    rebuildFirstStar();
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    w = window.innerWidth;
    h = window.innerHeight;
    textScale = w <= 768 ? 1.3 : 1;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    rebuildScene();
  }
  window.addEventListener('resize', resize);
  resize();

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function () { fontsReady = true; });
  } else {
    fontsReady = true;
  }

  function horizonY() {
    return h * horizonFrac;
  }

  function horizonBlendPx() {
    return Math.min(20, Math.max(10, h * 0.022));
  }

  function moonX() {
    return w * MOON_X_SLOTS[moonSlotIndex];
  }

  function moonRestY() {
    return h * 0.14;
  }

  function moonRadius() {
    return moonRadiusRef();
  }

  function moonY(nowT) {
    const rest = moonRestY();
    const elapsed = Math.min(MOON_ENTER_SEC, nowT);
    const p = elapsed / MOON_ENTER_SEC;
    const ease = 1 - Math.pow(1 - p, 3);
    const from = rest - h * 0.35;
    return from + (rest - from) * ease;
  }

  function moonCenterY(nowT) {
    return experienceStarted ? moonY(nowT) : moonRestY();
  }

  function beamCenterOffset(y, wt) {
    const hy = horizonY();
    const rel = (y - hy) / Math.max(1, h - hy);
    return (
      10 * Math.sin(y * 0.015 + wt * 0.55) +
      5 * Math.sin(rel * 8 + wt * 0.4) +
      3 * Math.sin(y * 0.028 - wt * 0.28)
    );
  }

  function phraseOpacity(t, phrase) {
    if (t < phrase.t0 || t >= phrase.t1) return 0;
    const local = t - phrase.t0;
    const fi = phrase.fadeIn, fo = phrase.fadeOut;
    const holdEnd = fi + phrase.hold;
    const dur = phrase.t1 - phrase.t0;
    if (local < fi) return local / fi;
    if (local < holdEnd) return 1;
    if (local < dur) return 1 - (local - holdEnd) / fo;
    return 0;
  }

  function currentPhrase(t) {
    for (let i = 0; i < PHRASES.length; i++) {
      const p = PHRASES[i];
      if (t >= p.t0 && t < p.t1) return p;
    }
    return null;
  }

  function textBob(nowT) {
    return 2 * Math.sin(nowT * (Math.PI / 2));
  }

  function phraseFont(size) {
    return "300 " + size + "px 'Cormorant Garamond', 'Noto Serif JP', serif";
  }

  /**
   * 単語ごとの中心 x（中央揃え）。
   * gap = fontSize * WORD_SPACING_EM
   */
  function layoutPhraseWords(text, centerX, fontSize) {
    const words = text.trim().split(/\s+/);
    const gap = fontSize * WORD_SPACING_EM;
    ctx.font = phraseFont(fontSize);
    let total = 0;
    const widths = [];
    let i;
    for (i = 0; i < words.length; i++) {
      const wi = ctx.measureText(words[i]).width;
      widths.push(wi);
      total += wi;
      if (i < words.length - 1) total += gap;
    }
    let left = centerX - total / 2;
    const out = [];
    for (i = 0; i < words.length; i++) {
      const wi = widths[i];
      out.push({ word: words[i], cx: left + wi / 2 });
      left += wi + gap;
    }
    return out;
  }

  /**
   * 最終フレーズ用 階段式（Let / me / stay / by・your・side）
   */
  function layoutPhraseStaircase(words, centerX, centerY, fontSize) {
    ctx.font = phraseFont(fontSize);
    const gap = fontSize * WORD_SPACING_EM;
    const lineHeight = fontSize * 1.45;
    const stairIndent = fontSize * 1.08;
    const widths = words.map(function (wd) {
      return ctx.measureText(wd).width;
    });

    const rowSteps = [0, 1, 2, 3];
    const rowIndices = [[0], [1], [2], [3, 4, 5]];

    const rowWidths = rowIndices.map(function (indices) {
      let rw = 0;
      let j;
      for (j = 0; j < indices.length; j++) {
        rw += widths[indices[j]];
        if (j < indices.length - 1) rw += gap;
      }
      return rw;
    });

    let maxRight = 0;
    let ri;
    for (ri = 0; ri < rowIndices.length; ri++) {
      const step = rowSteps[ri];
      const rightEdge = step * stairIndent + rowWidths[ri];
      if (rightEdge > maxRight) maxRight = rightEdge;
    }

    const blockLeft = centerX - maxRight / 2;

    const numRows = 4;
    const totalH = (numRows - 1) * lineHeight;
    const rowYs = [];
    for (ri = 0; ri < numRows; ri++) {
      rowYs.push(centerY - totalH / 2 + ri * lineHeight);
    }

    const out = [];
    out.push({
      word: words[0],
      cx: blockLeft + rowSteps[0] * stairIndent + widths[0] / 2,
      cy: rowYs[0]
    });
    out.push({
      word: words[1],
      cx: blockLeft + rowSteps[1] * stairIndent + widths[1] / 2,
      cy: rowYs[1]
    });
    out.push({
      word: words[2],
      cx: blockLeft + rowSteps[2] * stairIndent + widths[2] / 2,
      cy: rowYs[2]
    });

    let xLeft = blockLeft + rowSteps[3] * stairIndent;
    out.push({ word: words[3], cx: xLeft + widths[3] / 2, cy: rowYs[3] });
    xLeft += widths[3] + gap;
    out.push({ word: words[4], cx: xLeft + widths[4] / 2, cy: rowYs[3] });
    xLeft += widths[4] + gap;
    out.push({ word: words[5], cx: xLeft + widths[5] / 2, cy: rowYs[3] });

    return out;
  }

  function layoutPhraseLayout(phrase, centerX, centerY, fontSize) {
    if (phrase.staggerWords && phrase.staggerWords.length > 0 && phrase.staggerStaircase) {
      return layoutPhraseStaircase(phrase.staggerWords, centerX, centerY, fontSize);
    }
    let flat;
    if (phrase.staggerWords && phrase.staggerWords.length > 0) {
      flat = layoutPhraseWords(phrase.staggerWords.join(' '), centerX, fontSize);
    } else {
      flat = layoutPhraseWords(phrase.text, centerX, fontSize);
    }
    return flat.map(function (item) {
      return { word: item.word, cx: item.cx, cy: centerY };
    });
  }

  /**
   * スマホのみ: 文言ブロックが左右にはみ出さないよう cx を平行移動。
   * 月が左上のとき階段の「Let」が画面左で欠けるのを防ぐ。
   */
  function clampPhraseLayoutHorizontal(layout, fontSize) {
    if (w > 768 || layout.length === 0) return layout;
    ctx.font = phraseFont(fontSize);
    const pad = Math.max(16, w * 0.048);
    let minLeft = Infinity;
    let maxRight = -Infinity;
    let k;
    for (k = 0; k < layout.length; k++) {
      const wi = ctx.measureText(layout[k].word).width;
      minLeft = Math.min(minLeft, layout[k].cx - wi / 2);
      maxRight = Math.max(maxRight, layout[k].cx + wi / 2);
    }
    const sLow = pad - minLeft;
    const sHigh = (w - pad) - maxRight;
    const shift = (sLow + sHigh) / 2;
    if (Math.abs(shift) < 0.05) return layout;
    return layout.map(function (item) {
      return { word: item.word, cx: item.cx + shift, cy: item.cy };
    });
  }

  /** 最終フレーズ用: 経過秒 local に対する単語 i の不透明度係数 (0〜1) */
  function staggerWordOpacity(local, wordIndex) {
    const start = wordIndex * STAGGER_WORD_GAP;
    if (local < start) return 0;
    if (local < start + STAGGER_WORD_FADE) {
      return (local - start) / STAGGER_WORD_FADE;
    }
    return 1;
  }

  function drawSky(nowT) {
    const dp = dawnProgress(nowT);
    const hy = horizonY();
    const band = horizonBlendPx();
    const skyTop = lerpColor('#0a1628', '#1a2845', dp);
    const skyBot = lerpColor('#1a2942', '#3a4a6a', dp);
    const g = ctx.createLinearGradient(0, 0, 0, hy - band);
    g.addColorStop(0, skyTop);
    g.addColorStop(1, skyBot);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, hy - band);
  }

  function drawHorizonBlend(nowT) {
    const dp = dawnProgress(nowT);
    const hy = horizonY();
    const band = horizonBlendPx();
    const y0 = hy - band;
    const y1 = hy + band;

    const c0 = lerpColor('#0a1628', '#1a2845', dp);
    const c1 = lerpColor('#081222', '#2d3d5c', dp);
    const c2 = lerpColor('#060e1c', '#4a5068', dp);
    const c3 = lerpColor('#050d1a', '#152535', dp);

    const g = ctx.createLinearGradient(0, y0, 0, y1);
    g.addColorStop(0, c0);
    g.addColorStop(0.42, c1);
    g.addColorStop(0.58, c2);
    g.addColorStop(1, c3);
    ctx.fillStyle = g;
    ctx.fillRect(0, y0, w, y1 - y0);

    ctx.save();
    const fogOp = 0.045 * (1 - dp * 0.85);
    const fog = ctx.createLinearGradient(0, hy - 5, 0, hy + 5);
    fog.addColorStop(0, 'rgba(255, 248, 231, 0)');
    fog.addColorStop(0.5, 'rgba(255, 248, 231, ' + fogOp + ')');
    fog.addColorStop(1, 'rgba(255, 248, 231, 0)');
    ctx.fillStyle = fog;
    ctx.fillRect(0, hy - 8, w, 16);

    /** 地平の藤色〜ピンクの横帯（夜明け）高さは画面の約 4% */
    if (dp > 0.004) {
      const bandH = h * 0.04;
      const glowGrad = ctx.createLinearGradient(0, hy - bandH * 1.2, 0, hy + bandH * 0.8);
      glowGrad.addColorStop(0, 'rgba(180, 130, 160, 0)');
      glowGrad.addColorStop(0.45, 'rgba(200, 140, 165, ' + (0.42 * dp) + ')');
      glowGrad.addColorStop(0.5, 'rgba(220, 150, 170, ' + (0.52 * dp) + ')');
      glowGrad.addColorStop(0.55, 'rgba(90, 72, 104, ' + (0.55 * dp) + ')');
      glowGrad.addColorStop(1, 'rgba(180, 130, 160, 0)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(0, hy - bandH * 1.2, w, bandH * 2.2);
    }
    ctx.restore();
  }

  function drawWaterBg(nowT) {
    const dp = dawnProgress(nowT);
    const hy = horizonY();
    const band = horizonBlendPx();
    const top = hy + band;
    const w0 = lerpColor('#050d1a', '#152535', dp);
    const w1 = lerpColor('#081427', '#1a3048', dp);
    const w2 = lerpColor('#0f1e35', '#1e3550', dp);
    const g = ctx.createLinearGradient(0, top, 0, h);
    g.addColorStop(0, w0);
    g.addColorStop(0.5, w1);
    g.addColorStop(1, w2);
    ctx.fillStyle = g;
    ctx.fillRect(0, top, w, h - top);
  }

  /** brightnessMult / haloScaleMult: タップ前の呼吸。開始後はともに 1 */
  function drawMoon(nowT, brightnessMult, haloScaleMult) {
    const br = brightnessMult == null ? 1 : brightnessMult;
    const hs = haloScaleMult == null ? 1 : haloScaleMult;
    const cx = moonX();
    const cy = moonCenterY(nowT);
    const r = moonRadius();
    const mx = cx;
    const my = cy;

    ctx.save();
    for (let i = 5; i >= 1; i--) {
      const baseA = 0.08 / i;
      const radius = r * (1 + i * 0.8) * hs;
      const grad = ctx.createRadialGradient(mx, my, r, mx, my, radius);
      grad.addColorStop(0, 'rgba(255, 248, 231, ' + Math.min(1, baseA * br) + ')');
      grad.addColorStop(0.42, 'rgba(255, 236, 208, ' + Math.min(1, baseA * 0.38 * br) + ')');
      grad.addColorStop(0.74, 'rgba(255, 226, 188, ' + Math.min(1, baseA * 0.14 * br) + ')');
      grad.addColorStop(1, 'rgba(255, 248, 231, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(mx, my, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    const rimGlow = ctx.createRadialGradient(mx - r * 0.22, my - r * 0.22, r * 0.12, mx, my, r * 1.08 * hs);
    rimGlow.addColorStop(0, 'rgba(255, 252, 248, ' + Math.min(1, 0.92 * br) + ')');
    rimGlow.addColorStop(0.48, 'rgba(255, 248, 231, ' + Math.min(1, 0.2 * br) + ')');
    rimGlow.addColorStop(0.84, 'rgba(255, 248, 231, ' + Math.min(1, 0.1 * br) + ')');
    rimGlow.addColorStop(0.94, 'rgba(255, 248, 231, ' + Math.min(1, 0.3 * br) + ')');
    rimGlow.addColorStop(1, 'rgba(228, 210, 190, ' + Math.min(1, 0.42 * br) + ')');
    ctx.fillStyle = rimGlow;
    ctx.beginPath();
    ctx.arc(mx, my, r, 0, Math.PI * 2);
    ctx.fill();

    const core = ctx.createRadialGradient(mx - r * 0.2, my - r * 0.2, 0, mx, my, r * 0.9);
    core.addColorStop(0, '#fffef5');
    core.addColorStop(0.52, '#ffeec9');
    core.addColorStop(0.88, '#f5e6d0');
    core.addColorStop(1, '#e8dcc8');
    ctx.fillStyle = core;
    ctx.globalAlpha = Math.min(1.15, br);
    ctx.beginPath();
    ctx.arc(mx, my, r * 0.9, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.strokeStyle = 'rgba(255, 248, 231, ' + Math.min(1, 0.18 * br) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(mx, my, r * 0.97, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function particleAnchorY(nowT) {
    return moonY(nowT) + moonRadius() * 0.85;
  }

  function drawMoonlightParticles(nowT) {
    const cx = moonX();
    const hy = horizonY();
    const topY = particleAnchorY(nowT);
    const wt = nowT * WAVE_TIME;

    ctx.save();
    for (let i = 0; i < moonlightParticles.length; i++) {
      const p = moonlightParticles[i];
      const depth = p.relY;
      const y = topY + (h - topY) * depth;
      const spread = p.spread * depth;
      let wx = 0;
      if (y >= hy) {
        wx = beamCenterOffset(y, wt);
      }
      const wave =
        Math.sin(nowT * 1.5 * WAVE_TIME + p.phase) * 3 +
        Math.sin(nowT * 0.9 * WAVE_TIME + p.phase * 1.2) * 1.1;
      const x = cx + p.lane * spread + wx + wave;

      const flicker = 0.7 + Math.sin(nowT * 2 * WAVE_TIME + p.phase) * 0.3;
      let alpha = p.alpha * flicker;
      if (y < hy) {
        alpha *= 0.52 + 0.48 * (1 - depth);
      } else {
        alpha *= 0.82 + 0.18 * depth;
      }
      if (alpha > 0.6) alpha = 0.6;

      const sx = Math.max(0.8, p.size * (0.75 + 0.25 * flicker));
      const sy = sx * p.aspect;
      ctx.fillStyle = 'rgba(255, 248, 231, ' + alpha + ')';
      ctx.beginPath();
      ctx.ellipse(x, y, sx, sy, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  const WAVE_LAYERS = [
    { amp: 2.2, freq: 0.0095, speed: 0.38, phase: 0.0,   opacity: 0.11 },
    { amp: 2.8, freq: 0.0142, speed: -0.31, phase: 1.1, opacity: 0.14 },
    { amp: 2.4, freq: 0.021,  speed: 0.44, phase: 2.4, opacity: 0.12 },
    { amp: 3.5, freq: 0.028,  speed: 0.29, phase: 0.7, opacity: 0.14 },
    { amp: 2.5, freq: 0.036,  speed: -0.36, phase: 3.0, opacity: 0.1 },
    { amp: 2.0, freq: 0.048,  speed: 0.41, phase: 4.2, opacity: 0.2 },
    { amp: 1.8, freq: 0.061,  speed: 0.33, phase: 5.5, opacity: 0.1 }
  ];

  function drawWaterSurfaceWaves(nowT) {
    const hy = horizonY();
    const wt = nowT * WAVE_TIME;
    ctx.save();
    ctx.lineWidth = 1;
    ctx.lineJoin = 'round';
    for (let L = 0; L < WAVE_LAYERS.length; L++) {
      const layer = WAVE_LAYERS[L];
      const op = Math.min(0.25, Math.max(0.1, layer.opacity));
      ctx.strokeStyle = 'rgba(255, 248, 231, ' + op + ')';
      ctx.beginPath();
      for (let x = 0; x <= w; x += 2) {
        let off = layer.amp * Math.sin(x * layer.freq + wt * layer.speed + layer.phase);
        off += 0.32 * layer.amp * Math.sin(x * layer.freq * 2.12 + wt * layer.speed * 1.08);
        const yy = hy + off;
        if (x === 0) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function textPosition(nowT) {
    const cx = moonX();
    const hx = horizonY();
    const bob = textBob(nowT);
    const moonBottom = moonY(nowT) + moonRadius() * 1.05;

    let px;
    let py;
    if (todayPosition === 'moon') {
      px = cx;
      py = moonBottom + h * 0.06 + bob;
    } else if (todayPosition === 'path') {
      py = (moonBottom + h) * 0.52 + bob;
      const pathOff = beamCenterOffset(py, nowT * WAVE_TIME);
      px = cx + pathOff;
    } else {
      px = w * 0.5;
      py = hx + h * 0.1 + bob;
    }
    /** スマホかつ月が左スロット: アンカーをやや右へ（長い階段文の左欠け対策） */
    if (w <= 768 && moonSlotIndex === 0) {
      px += w * 0.065;
    }
    return { x: px, y: py, align: 'center' };
  }

  function drawPhraseGlowStrokeWords(layout, wordOps, fontSize) {
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;
    ctx.font = phraseFont(fontSize);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const rings = [14, 10, 7, 4];
    let r, k;
    for (r = 0; r < rings.length; r++) {
      ctx.lineWidth = rings[r];
      for (k = 0; k < layout.length; k++) {
        const op = wordOps[k];
        if (op <= 0.001) continue;
        ctx.strokeStyle = 'rgba(255, 248, 231, ' + (op * (0.028 + (rings.length - r) * 0.02)) + ')';
        ctx.strokeText(layout[k].word, layout[k].cx, layout[k].cy);
      }
    }
  }

  function drawPhraseBloomWords(layout, wordOps, fontSize) {
    ctx.font = phraseFont(fontSize);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalCompositeOperation = 'lighter';
    const blooms = [
      { blur: 32, am: 0.1 },
      { blur: 16, am: 0.2 },
      { blur: 8, am: 0.4 }
    ];
    let b, k;
    for (b = 0; b < blooms.length; b++) {
      const B = blooms[b];
      ctx.shadowBlur = B.blur;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      for (k = 0; k < layout.length; k++) {
        const op = wordOps[k];
        if (op <= 0.001) continue;
        ctx.shadowColor = 'rgba(255, 248, 231, ' + (B.am * op) + ')';
        ctx.fillStyle = 'rgba(255, 248, 231, ' + (op * 0.11) + ')';
        ctx.fillText(layout[k].word, layout[k].cx, layout[k].cy);
      }
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
  }

  function drawPhrase(nowT) {
    const phrase = currentPhrase(nowT);
    if (!phrase || !fontsReady) return;
    const baseOp = phraseOpacity(nowT, phrase);
    if (baseOp <= 0.001) return;

    const pos = textPosition(nowT);
    let sizeMul = phrase.phraseSizeScale != null ? phrase.phraseSizeScale : 1;
    /** パソコンのみ最終フレーズ（階段の一文）を現在サイズの 0.7 倍 */
    if (w > 768 && phrase.staggerStaircase) sizeMul *= 0.7;
    const fontSize = w * 0.036 * textScale * sizeMul;
    let layout = layoutPhraseLayout(phrase, pos.x, pos.y, fontSize);
    layout = clampPhraseLayoutHorizontal(layout, fontSize);

    const local = nowT - phrase.t0;
    const wordOps = [];
    let k;
    let any = false;
    if (phrase.staggerWords && phrase.staggerWords.length > 0) {
      for (k = 0; k < layout.length; k++) {
        const wo = baseOp * staggerWordOpacity(local, k);
        wordOps.push(wo);
        if (wo > 0.002) any = true;
      }
    } else {
      for (k = 0; k < layout.length; k++) {
        wordOps.push(baseOp);
      }
      any = true;
    }
    if (!any) return;

    ctx.save();
    drawPhraseGlowStrokeWords(layout, wordOps, fontSize);
    drawPhraseBloomWords(layout, wordOps, fontSize);

    ctx.font = phraseFont(fontSize);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff8e7';
    for (k = 0; k < layout.length; k++) {
      const wo = wordOps[k];
      if (wo <= 0.001) continue;
      ctx.globalAlpha = wo;
      ctx.fillText(layout[k].word, layout[k].cx, layout[k].cy);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  /** 一番星: 75秒から8秒かけてフェードイン、周期2.5秒の瞬き、半径は月の10〜12% */
  function drawFirstStar(nowT) {
    const fadeIn = Math.max(0, Math.min(1, (nowT - 75) / 8));
    const twinkle = 0.85 + 0.15 * Math.sin(nowT * ((Math.PI * 2) / 2.5));
    const starAlpha = fadeIn * twinkle;
    if (starAlpha <= 0.002) return;

    const sx = firstStar.x;
    const sy = firstStar.y;
    const sr = firstStar.r;

    ctx.save();
    const mults = [3, 5, 8];
    const halos = [0.15, 0.08, 0.04];
    let i;
    for (i = 0; i < 3; i++) {
      const radius = sr * mults[i];
      const alpha = starAlpha * halos[i];
      const grad = ctx.createRadialGradient(sx, sy, sr * 0.45, sx, sy, radius);
      grad.addColorStop(0, 'rgba(255, 248, 231, ' + alpha + ')');
      grad.addColorStop(1, 'rgba(255, 248, 231, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(sx, sy, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = 'rgba(255, 248, 231, ' + starAlpha + ')';
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  /** 体験開始前のみ: 月の左側に控えめな「tap」（開始後は描画しない） */
  function drawInitialTapHint() {
    const fs = w * 0.015 * textScale;
    const cx = moonX();
    const cy = moonCenterY(0);
    const r = moonRadius();
    const gap = fs * 0.5;
    ctx.save();
    ctx.font = phraseFont(fs);
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = textScale > 1 ? 'rgba(255, 248, 231, 0.26)' : 'rgba(255, 248, 231, 0.2)';
    ctx.fillText('tap', cx - r - gap, cy);
    ctx.restore();
  }

  function drawTapHint(nowT) {
    if (nowT < NARRATIVE_END_SEC || blackoutStart !== null) return;
    /** tap to close のみ、スマホ・PCとも基底に対して 1.8 倍（最終フレーズの縮小とは別） */
    const TAP_HINT_SIZE_MUL = 1.8;
    const fs = w * 0.015 * textScale * TAP_HINT_SIZE_MUL;
    const tapAlpha = textScale > 1 ? 0.5 : 0.3;
    ctx.save();
    ctx.font = phraseFont(fs);
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(255, 248, 231, ' + tapAlpha + ')';
    ctx.fillText('tap to close', w - fs * 0.8, h - fs * 0.8);
    ctx.restore();
  }

  function drawBlackout(nowMs) {
    if (blackoutStart === null) return;
    const p = Math.min(1, (nowMs - blackoutStart) / 3000);
    ctx.fillStyle = 'rgba(0, 0, 0, ' + p + ')';
    ctx.fillRect(0, 0, w, h);
  }

  function frame(nowMs) {
    ctx.clearRect(0, 0, w, h);

    if (!experienceStarted) {
      const breathPhase = (nowMs / 1000) * ((Math.PI * 2) / 3.5);
      const breath = Math.sin(breathPhase);
      const brightness = 0.8 + (breath + 1) * 0.15;
      const haloScale = 1.0 + breath * 0.08;
      drawSky(0);
      drawHorizonBlend(0);
      drawWaterBg(0);
      drawMoon(0, brightness, haloScale);
      drawInitialTapHint();
      drawBlackout(nowMs);
      if (blackoutStart === null || (nowMs - blackoutStart) < 3100) {
        requestAnimationFrame(frame);
      }
      return;
    }

    const nowT = (nowMs - appStart) / 1000;

    drawSky(nowT);
    drawFirstStar(nowT);
    drawHorizonBlend(nowT);
    drawWaterBg(nowT);
    drawMoon(nowT, 1, 1);
    drawMoonlightParticles(nowT);
    drawWaterSurfaceWaves(nowT);
    drawPhrase(nowT);
    drawTapHint(nowT);
    drawBlackout(nowMs);

    updateHumGain(nowT);

    if (blackoutStart === null || (nowMs - blackoutStart) < 3100) {
      requestAnimationFrame(frame);
    }
  }

  function onPointerDown(e) {
    if (!experienceStarted || appStart === null) return;
    const nowT = (performance.now() - appStart) / 1000;
    if (nowT < NARRATIVE_END_SEC || blackoutStart !== null) return;
    blackoutStart = performance.now();
    fadeOutHumOnClose();
    e.preventDefault();
  }
  canvas.addEventListener('pointerdown', onPointerDown, { passive: false });

  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
